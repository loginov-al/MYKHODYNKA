<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYKHODYNKA: Вход в систему</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        body {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    padding: 20px;
    overflow-x: hidden;
}
        .portal-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            overflow: hidden; 
            background-color: #ffffff; 
        }
        .lava-blob-blue { 
            position: absolute; 
            top: -30%; 
            right: -20%; 
            width: 130vw; 
            height: 130vw; 
            background: #52c85e; 
            border-radius: 40% 60% 30% 70%; 
            filter: blur(40px); 
            animation: floatBlob2 25s ease-in-out infinite alternate-reverse; 
            transform-origin: center; 
        }
        .lava-blob-red { 
            position: absolute; 
            bottom: -10%; 
            left: -10%; 
            width: 40vw; 
            height: 40vw; 
            background: #000000; 
            border-radius: 60% 40% 70% 30%; 
            filter: blur(35px); 
            animation: floatBlob3 20s ease-in-out infinite alternate; 
            transform-origin: center; 
        }
        @keyframes floatBlob2 { 
            0% { transform: translate(0, 0) rotate(0deg) scale(1); } 
            33% { transform: translate(-10vw, -5vh) rotate(-8deg) scale(1.15); } 
            66% { transform: translate(5vw, -10vh) rotate(8deg) scale(0.95); } 
            100% { transform: translate(-7vw, 7vh) rotate(-12deg) scale(1.1); } 
        }
        @keyframes floatBlob3 { 
            0% { transform: translate(0, 0) rotate(0deg) scale(1); } 
            33% { transform: translate(8vw, -3vh) rotate(10deg) scale(1.2); } 
            66% { transform: translate(-3vw, 5vh) rotate(-10deg) scale(0.8); } 
            100% { transform: translate(5vw, -5vh) rotate(15deg) scale(1.1); } 
        }
        .site-title { 
            color: #ffffff; 
            font-size: 2.5rem; 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 700; 
            letter-spacing: 1px; 
        }
        .main-wrapper { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            backdrop-filter: blur(10px); 
            background: rgba(255, 255, 255, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px; 
            padding: 30px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #1949BF;
            box-shadow: 0 0 0 3px rgba(25, 73, 191, 0.2);
        }
        button { 
            width: 100%;
            padding: 14px; 
            font-size: 1rem; 
            font-weight: 700; 
            color: #FFF; 
            background-color: #19bf4b; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        button:hover { 
            background-color: #0d3381; 
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>
    <div class="portal-bg">
        <div class="lava-blob-blue"></div>
        <div class="lava-blob-red"></div>
    </div>
    
    <div class="main-wrapper">
        <h1 class="site-title">MYKHODYNKA</h1>
        <div class="container">
            <form>
                <input type="email" placeholder="Введите свою почту" required>
                <input type="password" placeholder="Введите свой пароль" required>
                <button type="submit">Войти в аккаунт</button>
            </form>
        </div>


        
    </div>
</body>
</html>
